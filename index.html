 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ai-soc-sentinel/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOC MONITORING TOOL - LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
      :root {
        --bg-dark: #030408;
        --text-main: #e0e0e0;
        --text-muted: #888888;
        --border-color: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(3, 4, 8, 0.75);
        --critical: #ff003c;
        --high: #ff8c00;
        --elevated: #fce803;
        --brand: #00ffcc;
      }

      body { 
        background-color: var(--bg-dark) !important; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        height: 100vh; 
        width: 100vw; 
        font-family: 'Courier New', Courier, monospace;
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
      }

      /* CRT Scanline Effect */
      .scanlines {
        position: absolute;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.1) 50%,
          rgba(0,0,0,0.1)
        );
        background-size: 100% 4px;
        opacity: 0.3;
      }

      #root { position: absolute; inset: 0; z-index: 2000; pointer-events: none; }
      #map { position: absolute; inset: 0; z-index: 1; background-color: var(--bg-dark); }
      .ui-layer { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
      .pointer-events-auto { pointer-events: auto; }

      /* Top Navigation */
      .top-nav {
        position: absolute;
        top: 24px;
        left: 24px;
        display: flex;
        gap: 8px;
      }

      .nav-btn, .search-box {
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        color: #fff;
        padding: 10px 18px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 2px;
      }

      .nav-btn:hover, .search-box:focus {
        border-color: var(--brand);
        color: var(--brand);
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        outline: none;
      }

      .search-box { width: 280px; }

      /* The Wire Sidebar */
      .the-wire {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 400px;
        background: var(--glass-bg);
        border-left: 1px solid var(--border-color);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        box-shadow: -10px 0 30px rgba(0,0,0,0.8);
      }

      .wire-header {
        padding: 24px;
        border-bottom: 1px solid var(--border-color);
        background: rgba(255, 255, 255, 0.02);
      }

      .wire-header h1 {
        margin: 0 0 12px 0;
        font-size: 16px;
        letter-spacing: 3px;
        color: #ffffff;
      }

      .wire-stats {
        font-size: 11px;
        font-weight: bold;
        display: flex;
        gap: 16px;
      }

      .stat-critical { color: var(--critical); transition: color 0.2s; }
      .stat-high { color: var(--high); transition: color 0.2s; }
      .stat-elevated { color: var(--elevated); transition: color 0.2s; }

      .feed {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .feed::-webkit-scrollbar { width: 4px; }
      .feed::-webkit-scrollbar-track { background: transparent; }
      .feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

      /* Alert Cards */
      .alert-card {
        padding: 16px;
        margin-bottom: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid transparent;
        border-left: 4px solid #333;
        font-size: 12px;
        transition: all 0.3s ease;
        cursor: pointer;
        animation: slideIn 0.4s ease-out;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .alert-card:hover { background: rgba(255, 255, 255, 0.08); }
      .alert-card.critical { border-left-color: var(--critical); }
      .alert-card.high { border-left-color: var(--high); }
      .alert-card.elevated { border-left-color: var(--elevated); }

      .alert-title { font-weight: bold; color: #fff; margin-bottom: 8px; font-size: 13px; }
      .alert-meta { color: var(--text-muted); font-size: 10px; margin-bottom: 8px; }
      .alert-desc { color: #aaa; line-height: 1.4; }

      /* Map Markers & Lines */
      .pulse-icon { background: transparent; }
      .pulse {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--critical);
        box-shadow: 0 0 0 rgba(255, 0, 60, 0.6);
        animation: pulse-animation 1.5s infinite;
      }
      .pulse.high { background: var(--high); box-shadow: 0 0 0 rgba(255, 140, 0, 0.6); }
      .pulse.elevated { background: var(--elevated); box-shadow: 0 0 0 rgba(252, 232, 3, 0.6); }

      @keyframes pulse-animation {
        0% { box-shadow: 0 0 0 0 rgba(inherit, 0.7); transform: scale(0.9); }
        70% { box-shadow: 0 0 0 25px rgba(0, 0, 0, 0); transform: scale(1); }
        100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); transform: scale(0.9); }
      }

      /* Animated Attack Lines */
      .attack-vector {
        stroke-dasharray: 8 8;
        animation: dashStream 1s linear infinite, fadeOut 3s forwards;
      }
      @keyframes dashStream { to { stroke-dashoffset: -16; } }
      @keyframes fadeOut { 
        0% { opacity: 1; } 
        80% { opacity: 1; }
        100% { opacity: 0; } 
      }
    </style>

    <script type="module" crossorigin src="/ai-soc-sentinel/assets/index-Bb5ENhK4.js"></script>
    <link rel="stylesheet" crossorigin href="/ai-soc-sentinel/assets/index-BvuUJv_N.css">
  </head>
  <body>
    <div class="scanlines"></div>
    <div id="root"></div>
    <div id="map"></div>

    <div class="ui-layer">
      <div class="top-nav pointer-events-auto">
        <input type="text" class="search-box" placeholder="LOCATE / IP OR REGION" />
        <button class="nav-btn">SYSTEM SCAN</button>
        <button class="nav-btn" onclick="map.zoomIn()">ZOOM IN</button>
        <button class="nav-btn" onclick="map.zoomOut()">ZOOM OUT</button>
        <button class="nav-btn" onclick="map.setView([25.0, 10.0], 3)">RESET</button>
      </div>

      <div class="the-wire pointer-events-auto">
        <div class="wire-header">
          <h1>LIVE TELEMETRY</h1>
          <div class="wire-stats">
            <span class="stat-critical" id="count-critical">0 CRITICAL</span>
            <span class="stat-high" id="count-high">0 HIGH</span>
            <span class="stat-elevated" id="count-elevated">0 ELEVATED</span>
          </div>
        </div>
        <div class="feed" id="alert-feed"></div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 1. Initialize Map
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        worldCopyJump: true 
      }).setView([20.0, 0.0], 3);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

      // 2. Simulation Databases
      const locations = [
        { name: "Moscow, RU", lat: 55.75, lng: 37.61 }, { name: "Beijing, CN", lat: 39.90, lng: 116.40 },
        { name: "New York, US", lat: 40.71, lng: -74.00 }, { name: "London, UK", lat: 51.50, lng: -0.12 },
        { name: "Tehran, IR", lat: 35.68, lng: 51.38 }, { name: "Pyongyang, KP", lat: 39.03, lng: 125.75 },
        { name: "San Francisco, US", lat: 37.77, lng: -122.41 }, { name: "Frankfurt, DE", lat: 50.11, lng: 8.68 },
        { name: "Tokyo, JP", lat: 35.67, lng: 139.65 }, { name: "Sydney, AU", lat: -33.86, lng: 151.20 }
      ];

      const threatTypes = [
        { title: "DDoS Volumetric Spike", desc: "Incoming traffic exceeding 100Gbps detected at edge firewall.", level: "high" },
        { title: "Unauthorized Exfiltration", desc: "Large encrypted payload bypassing DLP controls.", level: "critical" },
        { title: "Zero-Day Exploit Attempt", desc: "Signature matches unknown memory corruption vector.", level: "critical" },
        { title: "Anomalous Login", desc: "Multiple failed attempts on root domain controller.", level: "elevated" },
        { title: "Ransomware Beacon", desc: "Internal host attempting C2 communication on port 4444.", level: "high" }
      ];

      const stats = { critical: 0, high: 0, elevated: 0 };
      const colors = { critical: '#ff003c', high: '#ff8c00', elevated: '#fce803' };

      // 3. The Core Simulation Engine
      function generateThreat() {
        // Pick random source and target
        const source = locations[Math.floor(Math.random() * locations.length)];
        let target = locations[Math.floor(Math.random() * locations.length)];
        while(target === source) target = locations[Math.floor(Math.random() * locations.length)]; // Ensure they aren't the same
        
        const threat = threatTypes[Math.floor(Math.random() * threatTypes.length)];
        
        // Update Stats
        stats[threat.level]++;
        document.getElementById(`count-${threat.level}`).innerText = `${stats[threat.level]} ${threat.level.toUpperCase()}`;

        // Create Map Marker
        const pulseIcon = L.divIcon({
          className: 'pulse-icon',
          html: `<div class="pulse ${threat.level}"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7] 
        });

        const marker = L.marker([target.lat, target.lng], { icon: pulseIcon }).addTo(map);

        // Draw Attack Line
        const line = L.polyline([[source.lat, source.lng], [target.lat, target.lng]], {
          color: colors[threat.level],
          weight: 2,
          opacity: 0.8,
          className: 'attack-vector'
        }).addTo(map);

        // Build Sidebar Card
        const card = document.createElement('div');
        card.className = `alert-card ${threat.level}`;
        const timeString = new Date().toLocaleTimeString();
        
        card.innerHTML = `
          <div class="alert-title">${threat.title}</div>
          <div class="alert-meta">${threat.level} • ${timeString} • ${source.name} ➔ ${target.name}</div>
          <div class="alert-desc">${threat.desc}</div>
        `;

        card.onclick = () => map.flyTo([target.lat, target.lng], 5, { duration: 1 });
        
        // Prepend adds to the top of the list
        const feed = document.getElementById('alert-feed');
        feed.prepend(card);

        // Keep feed from getting too long
        if (feed.children.length > 20) feed.removeChild(feed.lastChild);

        // Cleanup Map vectors after 3 seconds to prevent clutter
        setTimeout(() => {
          map.removeLayer(marker);
          map.removeLayer(line);
        }, 3000);
      }

      // 4. Start the engine! Generate a threat every 1.5 to 3 seconds
      function loopSimulation() {
        generateThreat();
        setTimeout(loopSimulation, Math.random() * 2000 + 1000);
      }

      // Initial burst of data
      setTimeout(() => {
        generateThreat(); generateThreat(); generateThreat();
        loopSimulation();
      }, 500);

    </script>
  </body>
</html>
