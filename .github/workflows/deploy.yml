name: 🚀 CI/CD — Build, Lint & Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint + Build
  # ──────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          # Vite needs base path for GH Pages subpath routing
          BASE_URL: "/ai-soc-sentinel/"

      - name: 📄 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ──────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # (Only runs on push to master, not on PRs)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
